<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    overflow-x: hidden;
}

.container {
    padding: 40px 20px;
}

h1 {
    font-size: 3em;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 30px #fff; }
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: white;
    color: #ff4081;
    cursor: pointer;
    margin-top: 20px;
}

.hidden {
    display: none;
}

.message {
    font-size: 22px;
    margin-top: 20px;
    min-height: 60px;
}

.gallery img {
    width: 150px;
    border-radius: 15px;
    margin: 10px;
}

/* Cake */
.cake {
    margin: 20px auto;
    width: 100px;
    height: 100px;
    background: #fff;
    border-radius: 10px;
    position: relative;
}

.candle {
    width: 10px;
    height: 30px;
    background: orange;
    position: absolute;
    top: -30px;
    left: 45px;
}

.flame {
    width: 10px;
    height: 10px;
    background: yellow;
    border-radius: 50%;
    position: absolute;
    top: -40px;
    left: 45px;
    animation: flicker 0.5s infinite alternate;
}

@keyframes flicker {
    from { transform: scale(1); }
    to { transform: scale(1.3); }
}

/* Countdown */
#countdown {
    font-size: 20px;
    margin-top: 10px;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: white;
    top: 0;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Happy Birthday My Love 🎂</h1>

    <div id="countdown"></div>

    <button onclick="startSurprise()">Start Surprise 💖</button>

    <div id="surprise" class="hidden">

        <div class="cake">
            <div class="candle"></div>
            <div class="flame"></div>
        </div>

        <p class="message" id="typedText"></p>

        <div class="gallery">
            <img src="https://picsum.photos/200?1">
            <img src="https://picsum.photos/200?2">
            <img src="https://picsum.photos/200?3">
        </div>

        <h2>💖 Forever Yours 💖</h2>
    </div>
</div>

<!-- Music -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<script>
// Countdown (set birthday date)
let targetDate = new Date("2026-04-10 00:00:00").getTime();

setInterval(() => {
    let now = new Date().getTime();
    let diff = targetDate - now;

    let days = Math.floor(diff / (1000*60*60*24));
    let hours = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
    let mins = Math.floor((diff % (1000*60*60))/(1000*60));
    let secs = Math.floor((diff % (1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        `⏳ ${days}d ${hours}h ${mins}m ${secs}s left`;
}, 1000);

// Typing effect
const message = "You are the most special person in my life ❤️ I am so lucky to have you 💕 Happy Birthday my love 🎉";
let i = 0;

function typeEffect() {
    if (i < message.length) {
        document.getElementById("typedText").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}

// Confetti
function createConfetti() {
    for (let i = 0; i < 50; i++) {
        let conf = document.createElement("div");
        conf.classList.add("confetti");
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(conf);
    }
}

// Start surprise
function startSurprise() {
    document.getElementById("surprise").classList.remove("hidden");
    document.getElementById("music").play();
    typeEffect();
    createConfetti();
}
</script>

</body>
</html>
